<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Gigabit Beeline — Интернет-пакеты до 3 раз дешевле</title>
<style>
  :root{
    --bg: #FAF8F4;
    --bg-2: #F3F0E9;
    --ink: #17160F;
    --ink-soft: #6B6656;
    --ink-faint: #A39E8C;
    --glow-a: #FFD84D;
    --glow-b: #FFC220;
    --line: rgba(23,22,15,0.08);
    --glass: rgba(255,255,255,0.55);
    --glass-border: rgba(255,255,255,0.9);
    --wa: #1FAF5C;
    --wa-dark: #17924C;
    --shadow-soft: 0 1px 2px rgba(23,22,15,0.04), 0 8px 24px rgba(23,22,15,0.06);
    --shadow-deep: 0 20px 60px rgba(23,22,15,0.10), 0 4px 16px rgba(23,22,15,0.06);
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

  html{ background: var(--bg); }

  body{
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Inter", "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100svh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    position: relative;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }

  /* ---------- Ambient light field ---------- */
  .field{
    position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
  }
  .glow{
    position: absolute; border-radius: 50%;
    filter: blur(38px);
    opacity: 0.7;
    will-change: transform;
  }
  .glow.g1{
    width: 480px; height: 480px; top: -210px; left: -170px;
    background: radial-gradient(circle at 35% 35%, var(--glow-a) 0%, var(--glow-a) 28%, transparent 68%);
    animation: drift1 22s ease-in-out infinite;
  }
  .glow.g2{
    width: 420px; height: 420px; bottom: -190px; right: -170px;
    background: radial-gradient(circle at 60% 60%, var(--glow-b) 0%, var(--glow-b) 26%, transparent 66%);
    animation: drift2 26s ease-in-out infinite;
  }
  .glow.g3{
    width: 280px; height: 280px; top: 38%; left: 50%; transform: translateX(-50%);
    background: radial-gradient(circle, var(--glow-a) 0%, var(--glow-a) 20%, transparent 70%);
    opacity: 0.4;
    animation: pulse3 8s ease-in-out infinite;
  }
  @keyframes drift1{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(30px, 40px) scale(1.08); }
  }
  @keyframes drift2{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(-25px,-30px) scale(1.06); }
  }
  @keyframes pulse3{
    0%,100%{ opacity: 0.28; }
    50%{ opacity: 0.42; }
  }
  .grain{
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    opacity: 0.045; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* ---------- Layout ---------- */
  .wrap{
    position: relative; z-index: 2;
    min-height: 100svh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 64px 22px 40px;
    max-width: 560px;
    margin: 0 auto;
    text-align: center;
  }

  /* ---------- Signal emblem ---------- */
  .emblem-stage{
    position: relative;
    width: 156px; height: 156px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 30px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) forwards;
  }
  .ring{
    position: absolute; border-radius: 50%;
    border: 1px solid rgba(23,22,15,0.18);
  }
  .ring.r1{ width: 156px; height: 156px; animation: pulseRing 5.5s ease-out infinite; }
  .ring.r2{ width: 156px; height: 156px; animation: pulseRing 5.5s ease-out infinite; animation-delay: 1.8s; }
  .ring.r3{ width: 156px; height: 156px; animation: pulseRing 5.5s ease-out infinite; animation-delay: 3.6s; }
  @keyframes pulseRing{
    0%{ transform: scale(0.6); opacity: 0; }
    15%{ opacity: 0.85; }
    100%{ transform: scale(1.5); opacity: 0; }
  }
  .emblem{
    position: relative;
    width: 118px; height: 118px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    isolation: auto;
    background: repeating-linear-gradient(
      128deg,
      #FFC220 0px, #FFC220 22px,
      #14130D 22px, #14130D 44px
    );
    background-size: 300% 300%;
    animation: stripeShift 5s linear infinite;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.5) inset,
      0 18px 40px rgba(23,22,15,0.22),
      0 6px 14px rgba(23,22,15,0.12);
    border: 1px solid rgba(255,255,255,0.6);
  }
  @keyframes stripeShift{
    0%{ background-position: 0% 0%; }
    100%{ background-position: 130% 130%; }
  }
  .emblem span{
    position: relative;
    font-size: 32px; font-weight: 900; letter-spacing: 0.5px;
    color: #FFC220;
    mix-blend-mode: difference;
    font-variant-numeric: tabular-nums;
  }

  /* ---------- Type ---------- */
  h1{
    font-size: 46px;
    line-height: 1.04;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: var(--ink);
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay: 0.08s;
  }
  h1 em{
    font-style: normal;
    background: linear-gradient(100deg, #B98900 0%, #E8AC00 40%, #17160F 40%, #17160F 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }

  .subtitle{
    margin-top: 16px;
    font-size: 19px;
    line-height: 1.42;
    font-weight: 460;
    color: var(--ink-soft);
    max-width: 340px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay: 0.16s;
  }
  .subtitle b{
    color: var(--ink);
    font-weight: 700;
  }

  /* ---------- Features ---------- */
  .features{
    margin-top: 32px;
    display: flex; flex-direction: column; gap: 10px;
    width: 100%; max-width: 360px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay: 0.36s;
  }
  .feature{
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow: var(--shadow-soft);
    text-align: left;
    transition: transform 0.4s cubic-bezier(.16,1,.3,1), box-shadow 0.4s cubic-bezier(.16,1,.3,1);
  }
  .feature:active{ transform: scale(0.98); }
  .check{
    flex: 0 0 auto;
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(155deg, #FFF3CC, #FFCF3D);
    box-shadow: 0 3px 8px rgba(255,193,30,0.35);
  }
  .check svg{ width: 13px; height: 13px; }
  .feature p{
    font-size: 15.5px; font-weight: 560; letter-spacing: -0.01em;
    color: var(--ink);
  }

  /* ---------- CTA ---------- */
  .cta-zone{
    margin-top: 30px;
    width: 100%; max-width: 360px;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay: 0.26s;
    position: relative;
  }
  .cta-glow{
    position: absolute; inset: -18px;
    background: radial-gradient(ellipse at center, rgba(31,175,92,0.35), transparent 70%);
    filter: blur(18px);
    animation: ctaPulse 2.6s ease-in-out infinite;
    z-index: -1;
  }
  @keyframes ctaPulse{
    0%,100%{ opacity: 0.55; transform: scale(1); }
    50%{ opacity: 0.9; transform: scale(1.06); }
  }
  .cta{
    position: relative;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%;
    padding: 20px 28px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(160deg, #27C766 0%, var(--wa) 55%, var(--wa-dark) 100%);
    color: #fff;
    font-size: 19px;
    font-weight: 720;
    letter-spacing: -0.01em;
    cursor: pointer;
    text-decoration: none;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.4) inset,
      0 -10px 20px rgba(0,0,0,0.14) inset,
      0 18px 40px rgba(31,175,92,0.38),
      0 6px 14px rgba(23,22,15,0.10);
    transition: transform 0.35s cubic-bezier(.16,1,.3,1), box-shadow 0.35s cubic-bezier(.16,1,.3,1);
    -webkit-tap-highlight-color: transparent;
  }
  .cta:hover{
    transform: translateY(-3px) scale(1.015);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.45) inset,
      0 -10px 20px rgba(0,0,0,0.14) inset,
      0 24px 50px rgba(31,175,92,0.44),
      0 8px 18px rgba(23,22,15,0.12);
  }
  .cta:active{ transform: translateY(0) scale(0.985); }
  .cta svg{ width: 24px; height: 24px; flex: 0 0 auto; }

  .status{
    margin-top: 18px;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 560; color: var(--ink-faint);
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay: 0.46s;
  }
  .status .dot{
    width: 7px; height: 7px; border-radius: 50%; background: var(--wa);
    box-shadow: 0 0 0 0 rgba(31,175,92,0.5);
    animation: liveDot 2s ease-in-out infinite;
  }
  @keyframes liveDot{
    0%{ box-shadow: 0 0 0 0 rgba(31,175,92,0.5); }
    70%{ box-shadow: 0 0 0 7px rgba(31,175,92,0); }
    100%{ box-shadow: 0 0 0 0 rgba(31,175,92,0); }
  }

  @keyframes rise{
    from{ opacity: 0; transform: translateY(18px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  :focus-visible{
    outline: 2px solid var(--wa-dark);
    outline-offset: 3px;
    border-radius: 12px;
  }

  /* ---------- Desktop refinement ---------- */
  @media (min-width: 720px){
    .wrap{ padding: 90px 24px 70px; max-width: 620px; }
    h1{ font-size: 60px; }
    .subtitle{ font-size: 21px; max-width: 400px; }
    .features{ max-width: 400px; }
    .cta-zone{ max-width: 400px; }
    .cta{ padding: 22px 32px; font-size: 20px; }
    .emblem-stage{ width: 180px; height: 180px; margin-bottom: 38px; }
    .ring.r1, .ring.r2, .ring.r3{ width: 180px; height: 180px; }
    .emblem{ width: 136px; height: 136px; }
    .emblem span{ font-size: 37px; }
  }

  @media (min-height: 780px) and (min-width: 720px){
    .wrap{ min-height: 100svh; }
  }
</style>

<body>

  <div class="field">
    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>
  </div>
  <div class="grain"></div>

  <main class="wrap">

    <div class="emblem-stage">
      <div class="ring r1"></div>

        <span>GB</span>
      </div>

        Написать в WhatsApp
      </a>
    </div>

    <div class="features">
      <div class="feature">
        <span class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5L9.5 18L20 6" stroke="#17160F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <p>Быстрое подключение</p>
      </div>
      <div class="feature">
        <span class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5L9.5 18L20 6" stroke="#17160F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <p>Интернет-пакеты на 30 дней</p>
      </div>
      <div class="feature">
        <span class="check"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12.5L9.5 18L20 6" stroke="#17160F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        <p>Поддержка через WhatsApp</p>
      </div>
    </div>

    <div class="status">
      <span class="dot"></span>

    </div>

  </main>
