<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Gigabit Beeline</title>

<meta name="theme-color" content="#FFD400">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:"Inter",sans-serif;

background:#FAFAFA;

color:#111;

min-height:100vh;

overflow-x:hidden;

display:flex;
justify-content:center;
align-items:center;

padding:24px;

position:relative;

}

body::before{

content:"";

position:fixed;

width:430px;
height:430px;

background:#FFD400;

filter:blur(140px);

border-radius:50%;

opacity:.22;

top:-170px;
right:-170px;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:360px;
height:360px;

background:#FFD400;

filter:blur(130px);

border-radius:50%;

opacity:.18;

bottom:-160px;
left:-160px;

z-index:-2;

}

.container{

width:100%;
max-width:430px;

}

.card{

background:rgba(255,255,255,.72);

backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);

border:1px solid rgba(255,255,255,.7);

border-radius:34px;

padding:42px 30px;

box-shadow:

0 25px 60px rgba(0,0,0,.08),

0 8px 20px rgba(0,0,0,.05);

text-align:center;

}

.logo{

width:88px;
height:88px;

margin:auto;

border-radius:50%;

background:#FFD400;

display:flex;

align-items:center;
justify-content:center;

font-size:34px;
font-weight:800;

color:#111;

box-shadow:

0 10px 30px rgba(255,212,0,.45);

margin-bottom:26px;

}

h1{

font-size:34px;

font-weight:800;

margin-bottom:12px;

letter-spacing:-1px;

}

.subtitle{

font-size:20px;

font-weight:600;

line-height:1.35;

color:#333;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="logo">
GB
</div>

<h1>Gigabit Beeline</h1>

<div class="subtitle">
Интернет-пакеты<br>
до 3 раз дешевле
</div>

</div>

</div>

</body>
</html>
