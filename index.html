<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Gigabit Beeline</title>

<meta name="theme-color" content="#FFD400">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:"Inter",sans-serif;

background:#FAFAFA;

color:#111;

min-height:100vh;

overflow-x:hidden;

display:flex;
justify-content:center;
align-items:center;

position:relative;

padding:24px;

}

/* Жёлтые размытые фигуры */

body::before{

content:"";

position:fixed;

width:420px;
height:420px;

background:#FFD400;

border-radius:50%;

filter:blur(130px);

opacity:.22;

top:-140px;
right:-160px;

z-index:-2;

}

body::after{

content:"";

position:fixed;

width:360px;
height:360px;

background:#FFD400;

border-radius:50%;

filter:blur(120px);

opacity:.18;

bottom:-170px;
left:-170px;

z-index:-2;

}

.container{

width:100%;
max-width:420px;

}

</style>

</head>

<body>

<div class="container">

</div>

</body>

</html>
